function armLen(s){return Math.min(W,H)*.88*(.92-(s/15)*.70);}

function resize(){const r=cwrap.getBoundingClientRect();W=r.width;H=r.height;canvas.width=W;canvas.height=H;px=W*.5;py=H*.96;wa=Math.PI*.25;}

    if(soundMode===0){
      const t1=ac.createOscillator(),tg=ac.createGain();t1.connect(tg);tg.connect(pan);t1.type='sine';t1.frequency.value=freq*.5;
      tg.gain.setValueAtTime(0,now);tg.gain.linearRampToValueAtTime(.08,now+.004);tg.gain.exponentialRampToValueAtTime(.001,now+.12);t1.start(now);t1.stop(now+.15);
      const s1=ac.createOscillator(),sg=ac.createGain();s1.connect(sg);sg.connect(pan);s1.type='sine';
      s1.frequency.setValueAtTime(freq*1.03,now);s1.frequency.exponentialRampToValueAtTime(freq,now+.06);
      sg.gain.setValueAtTime(0,now);sg.gain.linearRampToValueAtTime(.13,now+.006);sg.gain.exponentialRampToValueAtTime(.001,now+1.6);s1.start(now);s1.stop(now+1.7);
      const h1=ac.createOscillator(),hg=ac.createGain();h1.connect(hg);hg.connect(pan);h1.type='sine';h1.frequency.value=freq*2;
      hg.gain.setValueAtTime(0,now);hg.gain.linearRampToValueAtTime(.04,now+.005);hg.gain.exponentialRampToValueAtTime(.001,now+.7);h1.start(now);h1.stop(now+.8);
    }else if(soundMode===1){
      const o=ac.createOscillator(),o2=ac.createOscillator(),g=ac.createGain(),g2=ac.createGain(),vib=ac.createOscillator(),vg=ac.createGain();
      o.connect(g);g.connect(pan);o2.connect(g2);g2.connect(pan);vib.connect(vg);vg.connect(o.frequency);
      o.type='sine';o.frequency.value=freq;o2.type='sine';o2.frequency.value=freq*1.005;vib.type='sine';vib.frequency.value=5.5;
      vg.gain.setValueAtTime(0,now);vg.gain.linearRampToValueAtTime(freq*.012,now+.15);
      g.gain.setValueAtTime(0,now);g.gain.linearRampToValueAtTime(.10,now+.08);g.gain.setValueAtTime(.10,now+.5);g.gain.exponentialRampToValueAtTime(.001,now+1.8);
      g2.gain.setValueAtTime(0,now);g2.gain.linearRampToValueAtTime(.04,now+.08);g2.gain.exponentialRampToValueAtTime(.001,now+1.5);
      vib.start(now);vib.stop(now+1.9);o.start(now);o.stop(now+1.9);o2.start(now);o2.stop(now+1.9);
    }else if(soundMode===2){
      const o=ac.createOscillator(),g=ac.createGain();o.connect(g);g.connect(pan);o.type='sine';o.frequency.value=freq;
      g.gain.setValueAtTime(0,now);g.gain.linearRampToValueAtTime(.12,now+.02);g.gain.setValueAtTime(.12,now+.3);g.gain.exponentialRampToValueAtTime(.001,now+1.4);o.start(now);o.stop(now+1.5);
      try{const bsz=Math.floor(ac.sampleRate*.04),buf=ac.createBuffer(1,bsz,ac.sampleRate),d=buf.getChannelData(0);
        for(let n=0;n<bsz;n++)d[n]=(Math.random()*2-1)*(1-n/bsz);
        const src=ac.createBufferSource(),fi=ac.createBiquadFilter(),ng=ac.createGain();
        src.buffer=buf;fi.type='bandpass';fi.frequency.value=freq*2.5;fi.Q.value=1.5;src.connect(fi);fi.connect(ng);ng.connect(pan);ng.gain.value=.07;src.start(now);}catch(e){}
    }else if(soundMode===3){
      const o1=ac.createOscillator(),o2=ac.createOscillator(),g1=ac.createGain(),g2=ac.createGain(),vib=ac.createOscillator(),vg=ac.createGain();
      o1.connect(g1);g1.connect(pan);o2.connect(g2);g2.connect(pan);vib.connect(vg);vg.connect(o1.frequency);
      o1.type='sine';o1.frequency.value=freq;o2.type='sine';o2.frequency.value=freq*2.01;vib.type='sine';vib.frequency.value=7;
      vg.gain.setValueAtTime(0,now);vg.gain.linearRampToValueAtTime(freq*.008,now+.1);
      g1.gain.setValueAtTime(0,now);g1.gain.linearRampToValueAtTime(.16,now+.003);g1.gain.exponentialRampToValueAtTime(.001,now+1.4);
      g2.gain.setValueAtTime(0,now);g2.gain.linearRampToValueAtTime(.07,now+.003);g2.gain.exponentialRampToValueAtTime(.001,now+.6);
      vib.start(now);vib.stop(now+1.5);o1.start(now);o1.stop(now+1.5);o2.start(now);o2.stop(now+1.5);
    }else if(soundMode===4){
      const o=ac.createOscillator(),g=ac.createGain(),o2=ac.createOscillator(),g2=ac.createGain();
      o.connect(g);g.connect(pan);o2.connect(g2);g2.connect(pan);o.type='sine';o.frequency.value=freq*.5;o2.type='sine';o2.frequency.value=freq*.5*1.003;
      g.gain.setValueAtTime(0,now);g.gain.linearRampToValueAtTime(.11,now+.04);g.gain.setValueAtTime(.11,now+.4);g.gain.exponentialRampToValueAtTime(.001,now+2.0);
      g2.gain.setValueAtTime(0,now);g2.gain.linearRampToValueAtTime(.04,now+.04);g2.gain.exponentialRampToValueAtTime(.001,now+1.6);o.start(now);o.stop(now+2.1);o2.start(now);o2.stop(now+2.1);
      try{const bsz=Math.floor(ac.sampleRate*.08),buf=ac.createBuffer(1,bsz,ac.sampleRate),d=buf.getChannelData(0);
        for(let n=0;n<bsz;n++)d[n]=(Math.random()*2-1)*Math.pow(1-n/bsz,.5);
        const src=ac.createBufferSource(),fi=ac.createBiquadFilter(),ng=ac.createGain();
        src.buffer=buf;fi.type='bandpass';fi.frequency.value=freq*1.2;fi.Q.value=.8;src.connect(fi);fi.connect(ng);ng.connect(pan);ng.gain.value=.09;src.start(now);}catch(e){}
    }
  }catch(e){}
}

let lastTime=0;
function loop(ts){
  const dt=Math.min((ts-lastTime)/1000,.05);lastTime=ts;
  ctx.fillStyle='#C8281E';ctx.fillRect(0,0,W,H);
  const grd=ctx.createRadialGradient(px,py,0,px,py,H*.65);
  grd.addColorStop(0,'rgba(60,0,0,0.5)');grd.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=grd;ctx.fillRect(0,0,W,H);
  const wl=Math.max(W,H)*1.2;
  ctx.beginPath();ctx.moveTo(px,py);ctx.lineTo(px+Math.sin(-wa)*wl,py-Math.cos(wa)*wl);ctx.strokeStyle='rgba(245,230,163,0.18)';ctx.lineWidth=1.5;ctx.stroke();
  ctx.beginPath();ctx.moveTo(px,py);ctx.lineTo(px+Math.sin(wa)*wl,py-Math.cos(wa)*wl);ctx.strokeStyle='rgba(245,230,163,0.18)';ctx.lineWidth=1.5;ctx.stroke();
  for(let ti=0;ti<16;ti++){
    const ts2=TS[ti],sl=t2s(ti),al=armLen(sl),om=omega(sl),amp=wa*.90,bs=bspd(sl),r=brad(sl),col=SLOT_COLORS[sl];
    ts2.speed+=(ts2.targetSpeed-ts2.speed)*.05;
    if(ts2.flash>0)ts2.flash-=dt*2.5;
    if(ts2.activeFade>0)ts2.activeFade-=dt*.4;
    const prev=ts2.angle;
    if(ts2.active||ts2.activeFade>0){ts2.time+=dt*bs*ts2.speed;ts2.angle=amp*Math.sin(om*ts2.time);}
    const hL=prev>-amp*.94&&ts2.angle<=-amp*.94,hR=prev<amp*.94&&ts2.angle>=amp*.94;
    if((hL||hR)&&ts2.active){ts2.flash=1;ts2.flashSide=hL?-1:1;playNote(sl,ts2.flashSide);}
    const bx=px+Math.sin(ts2.angle)*al,by=py-Math.cos(ts2.angle)*al;
    const alpha=ts2.active?1.0:.08+ts2.activeFade*.14;
    if(ts2.active||ts2.activeFade>.05){ctx.beginPath();ctx.moveTo(px,py);ctx.lineTo(bx,by);ctx.strokeStyle=col+Math.floor(alpha*25).toString(16).padStart(2,'0');ctx.lineWidth=.8;ctx.stroke();}
    if(ts2.flash>0&&ts2.active){ctx.beginPath();ctx.arc(bx,by,r+10,0,Math.PI*2);ctx.fillStyle=col+Math.floor(ts2.flash*50).toString(16).padStart(2,'0');ctx.fill();}
    ctx.beginPath();ctx.arc(bx,by,r,0,Math.PI*2);ctx.globalAlpha=alpha;ctx.fillStyle=col;ctx.fill();ctx.globalAlpha=1;
    const row=document.getElementById('trow-'+sl);if(row)row.classList.toggle('active',ts2.active);
  }
  requestAnimationFrame(loop);
}

const feedEl=document.getElementById('feed');
// Both buys AND sells activate a ball if not already moving
function activateBall(ti){const ts2=TS[ti];if(!ts2.active){ts2.angle=0;ts2.time=0;ts2.speed=BASE_SPD;ts2.targetSpeed=BASE_SPD;ts2.active=true;ts2.activeFade=1;}}
function fireBuy(usd,lbl){const ti=getTierIdx(usd);activateBall(ti);TS[ti].active=true;TS[ti].activeFade=1;TS[ti].targetSpeed=Math.min(MAX_SPD,TS[ti].targetSpeed+0.20);addFeed('buy','▲ '+lbl+'  '+TIERS[ti].label);}
function fireSell(usd,lbl){const ti=getTierIdx(usd);activateBall(ti);TS[ti].targetSpeed=Math.max(MIN_SPD,TS[ti].targetSpeed-0.10);addFeed('sell','▼ '+lbl+'  '+TIERS[ti].label);}
function addFeed(type,text){const el=document.createElement('div');el.className='tx '+type;el.textContent=text;feedEl.insertBefore(el,feedEl.firstChild);while(feedEl.children.length>100)feedEl.removeChild(feedEl.lastChild);}

function restartChart(){initTierState();lastPollBuys=null;lastPollSells=null;}

// loadLastTX — silently warms up ball speeds, never touches the live feed
async function loadLastTX(count){
  ['tx20-btn','tx50-btn','tx100-btn'].forEach(id=>{const el=document.getElementById(id);if(el)el.classList.remove('active');});
  const btnId=count===20?'tx20-btn':count===50?'tx50-btn':'tx100-btn';
  const btn=document.getElementById(btnId);
  if(btn){btn.classList.add('active');btn.textContent='LOADING...';}
  initTierState();lastPollBuys=null;lastPollSells=null;
  try{
    const res=await fetch(`https://api.dexscreener.com/latest/dex/pairs/solana/${currentToken.pair}`);
    if(!res.ok)throw new Error();
    const data=await res.json();const pair=data.pairs?.[0]||data.pair;
    if(pair){
      // Use best available time window
      const wins=[
        {b:pair.txns?.m5?.buys||0, s:pair.txns?.m5?.sells||0, v:pair.volume?.m5||0},
        {b:pair.txns?.h1?.buys||0, s:pair.txns?.h1?.sells||0, v:pair.volume?.h1||0},
        {b:pair.txns?.h6?.buys||0, s:pair.txns?.h6?.sells||0, v:pair.volume?.h6||0},
        {b:pair.txns?.h24?.buys||0,s:pair.txns?.h24?.sells||0,v:pair.volume?.h24||0},
      ];
      for(const w of wins){
        const total=w.b+w.s;
        if(total>0){
          const avg=w.v>0?(w.v/total):20,n=Math.min(count,total),br=w.b/total;
          for(let i=0;i<n;i++){
            const usd=Math.max(1,avg*(0.3+Math.random()*1.4));
            const ti=getTierIdx(usd),ts2=TS[ti];
            if(!ts2.active){ts2.angle=0;ts2.time=0;ts2.speed=BASE_SPD;ts2.targetSpeed=BASE_SPD;ts2.active=true;ts2.activeFade=1;}
            if(Math.random()<br)ts2.targetSpeed=Math.min(MAX_SPD,ts2.targetSpeed+0.20);
            else ts2.targetSpeed=Math.max(MIN_SPD,ts2.targetSpeed-0.10);
          }
          TS.forEach(ts=>{ts.speed=ts.targetSpeed;});
          lastPollBuys=pair.txns?.m5?.buys||0;lastPollSells=pair.txns?.m5?.sells||0;
          setLive('on');break;
        }
      }
    }
  }catch(e){}
  const lbl=count===20?'LAST 20 TX':count===50?'LAST 50 TX':'LAST 100 TX';
  if(btn)btn.textContent=lbl;
  document.getElementById('poll-time').textContent='WARMED UP · '+new Date().toLocaleTimeString();
}

function fmt(n){if(n>=1e6)return'$'+(n/1e6).toFixed(2)+'M';if(n>=1e3)return'$'+(n/1e3).toFixed(1)+'K';return'$'+n.toFixed(0);}
function setLive(s){const d=document.getElementById('live-dot');d.className='';if(s==='on')d.classList.add('on');else if(s==='err')d.classList.add('err');}

async function pollJupPrice(){
  try{
    const res=await fetch(`https://api.jup.ag/price/v3?ids=${currentToken.mint},${SOL_MINT}`);
    if(!res.ok)return;const data=await res.json();
    const coin=data[currentToken.mint],sol=data[SOL_MINT];
    if(coin){
      const p=coin.usdPrice||0,chg=coin.priceChange24h||0;
      document.getElementById('s-price').textContent='$'+p.toFixed(7);
      const ce=document.getElementById('s-change');ce.textContent=(chg>=0?'+':'')+chg.toFixed(2)+'% 24H';ce.className='ssub '+(chg>=0?'green':'red');
      if(sol?.usdPrice>0)document.getElementById('s-sol').textContent=(p/sol.usdPrice).toFixed(9)+' SOL';
    }
  }catch(e){}
}

async function pollDex(){
  try{
    const res=await fetch(`https://api.dexscreener.com/latest/dex/pairs/solana/${currentToken.pair}`);
    if(!res.ok)throw new Error();const data=await res.json();const pair=data.pairs?.[0]||data.pair;
    if(!pair)throw new Error();
    document.getElementById('s-vol').textContent=fmt(pair.volume?.h24||0);
    document.getElementById('s-liq').textContent=fmt(pair.liquidity?.usd||0);
    document.getElementById('s-fdv').textContent=fmt(pair.fdv||0);
    const m5b=pair.txns?.m5?.buys||0,m5s=pair.txns?.m5?.sells||0;
    const vol5=pair.volume?.m5||0,avg=Math.max(5,vol5>0?(vol5/Math.max(1,m5b+m5s)):20);
    if(lastPollBuys!==null){
      const nb=Math.max(0,m5b-lastPollBuys),ns=Math.max(0,m5s-lastPollSells);
      for(let i=0;i<Math.min(nb,5);i++)fireBuy(avg*(0.5+Math.random()),'$'+avg.toFixed(0));
      for(let i=0;i<Math.min(ns,5);i++)fireSell(avg*(0.5+Math.random()),'$'+avg.toFixed(0));
    }
    lastPollBuys=m5b;lastPollSells=m5s;
    setLive('on');document.getElementById('poll-time').textContent='UPDATED '+new Date().toLocaleTimeString();
  }catch(e){setLive('err');document.getElementById('poll-time').textContent='RECONNECTING...';}
}

function switchToken(key){
  const tok=TOKENS[key];if(!tok)return;
  currentToken=tok;initTierState();lastPollBuys=null;lastPollSells=null;
  document.getElementById('tok-stitle').textContent=tok.name;
  document.getElementById('nav-dex').href=tok.dex;
  document.getElementById('nav-buy').href=tok.buy;
  document.getElementById('nav-buy').textContent='BUY '+tok.name;
  ['s-price','s-change','s-sol','s-vol','s-liq','s-fdv'].forEach(id=>document.getElementById(id).textContent='–');
  document.getElementById('s-change').className='ssub';
  document.getElementById('feed').innerHTML='';
  setLive('');
  initJupiter(tok);pollJupPrice();pollDex();
  setTimeout(()=>loadLastTX(100),400);
}

// Jupiter plugin-v1.js — no RPC, no API key needed, Ultra powered
function initJupiter(tok){
  tok=tok||currentToken;
  try{
    if(!window.Jupiter)return setTimeout(()=>initJupiter(tok),500);
    window.Jupiter.init({
      displayMode:'widget',
      widgetStyle:{position:'bottom-right',size:'default'},
      formProps:{
        initialInputMint:SOL_MINT,
        initialOutputMint:tok.mint,
      },
    });
  }catch(e){setTimeout(()=>initJupiter(tok),500);}
}

function toggleDropdown(){document.getElementById('chonk-menu').classList.toggle('open');}
document.addEventListener('click',e=>{if(!document.getElementById('chonk-dropdown').contains(e.target))document.getElementById('chonk-menu').classList.remove('open');});

resize();buildTierPanel();initTierState();
requestAnimationFrame(t=>{lastTime=t;requestAnimationFrame(loop);});
window.addEventListener('resize',resize);
setTimeout(()=>{loadLastTX(100);pollJupPrice();pollDex();setInterval(pollJupPrice,5000);setInterval(pollDex,3000);},800);
setTimeout(initJupiter,1500);
</script>
